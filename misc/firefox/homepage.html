<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Home</title>

    <style>
      :root {
        --bg: #0f0f0f;
        --fg: #eaeaea;
        --muted: #888;
        --accent: #4da3ff;
        font-family: monospace;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        min-width: 320px;
      }

      h1 {
        font-size: 5rem;
        font-weight: 500;
        margin: 0 0rem;
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        margin: 0 0.5rem;
        transition: color 0.2s ease;
      }

      nav a:hover {
        color: var(--accent);
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Welcome</h1>

      <nav>
        <a href="https://github.com">GitHub</a>
        <a href="https://youtube.com">YouTube</a>
        <a href="https://google.com">Google</a>
      </nav>
    </main>
  </body>
</html>
